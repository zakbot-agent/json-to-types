<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON to Types</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181b;
      --surface2: #1e1e22;
      --border: #2a2a2e;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
      --font-mono: "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 span {
      color: var(--accent);
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .root-name-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      width: 140px;
      outline: none;
      transition: border-color 0.15s;
    }

    .root-name-input:focus {
      border-color: var(--accent);
    }

    /* ── Main layout ────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel:first-child {
      border-right: 1px solid var(--border);
    }

    .panel-header {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Textarea (input) ───────────────────────────────── */
    textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Output ─────────────────────────────────────────── */
    .output-area {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    .output-content {
      display: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 100%;
    }

    .output-content.active { display: block; }

    .error-message {
      color: var(--red);
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .placeholder-msg {
      color: var(--text-muted);
      padding: 40px;
      text-align: center;
      font-size: 14px;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn.copied {
      border-color: var(--green);
      color: var(--green);
    }

    .btn-group { display: flex; gap: 6px; align-items: center; }

    /* ── Status bar ──────────────────────────────────────── */
    footer {
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Syntax highlighting (basic) ─────────────────────── */
    .hl-keyword { color: #c084fc; }
    .hl-type { color: #67e8f9; }
    .hl-string { color: #86efac; }
    .hl-symbol { color: #fbbf24; }
    .hl-comment { color: #71717a; font-style: italic; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 768px) {
      main { flex-direction: column; }
      .panel:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      .panel { max-height: 50vh; }
    }
  </style>
</head>
<body>

<header>
  <h1>
    <span>{}</span> JSON to Types
    <span class="badge">v1.0</span>
  </h1>
  <div class="btn-group">
    <label style="font-size:12px; color:var(--text-muted); margin-right:4px;">Root name:</label>
    <input type="text" class="root-name-input" id="rootName" value="Root" placeholder="Root" />
  </div>
</header>

<main>
  <!-- Left: JSON input -->
  <div class="panel">
    <div class="panel-header">
      <h2>JSON Input</h2>
      <div class="btn-group">
        <button class="btn" id="formatBtn" title="Format JSON">Format</button>
        <button class="btn" id="clearBtn" title="Clear">Clear</button>
      </div>
    </div>
    <textarea
      id="jsonInput"
      placeholder='Paste your JSON here...&#10;&#10;{&#10;  "name": "John",&#10;  "age": 30,&#10;  "address": {&#10;    "city": "Paris"&#10;  }&#10;}'
      spellcheck="false"
    ></textarea>
  </div>

  <!-- Right: Output -->
  <div class="panel">
    <div class="panel-header">
      <div class="tabs">
        <button class="tab active" data-tab="ts">TypeScript</button>
        <button class="tab" data-tab="zod">Zod Schema</button>
      </div>
      <div class="btn-group">
        <button class="btn" id="copyBtn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>
    <div class="output-area">
      <div class="output-content active" id="tsOutput">
        <div class="placeholder-msg">Type or paste JSON on the left to see TypeScript types here.</div>
      </div>
      <div class="output-content" id="zodOutput">
        <div class="placeholder-msg">Type or paste JSON on the left to see Zod schemas here.</div>
      </div>
    </div>
  </div>
</main>

<footer>
  <span id="status">Ready</span>
  <span>json-to-types</span>
</footer>

<script>
  const jsonInput = document.getElementById("jsonInput");
  const tsOutput = document.getElementById("tsOutput");
  const zodOutput = document.getElementById("zodOutput");
  const rootNameInput = document.getElementById("rootName");
  const status = document.getElementById("status");
  const copyBtn = document.getElementById("copyBtn");
  const formatBtn = document.getElementById("formatBtn");
  const clearBtn = document.getElementById("clearBtn");

  let currentTab = "ts";
  let lastTs = "";
  let lastZod = "";

  // ── Tab switching ──────────────────────────────────────
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      currentTab = tab.dataset.tab;
      tsOutput.classList.toggle("active", currentTab === "ts");
      zodOutput.classList.toggle("active", currentTab === "zod");
    });
  });

  // ── Real-time conversion ───────────────────────────────
  let debounceTimer;
  jsonInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(convert, 200);
  });
  rootNameInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(convert, 300);
  });

  async function convert() {
    const raw = jsonInput.value.trim();
    if (!raw) {
      tsOutput.innerHTML = '<div class="placeholder-msg">Type or paste JSON on the left to see TypeScript types here.</div>';
      zodOutput.innerHTML = '<div class="placeholder-msg">Type or paste JSON on the left to see Zod schemas here.</div>';
      status.textContent = "Ready";
      lastTs = "";
      lastZod = "";
      return;
    }

    try {
      const resp = await fetch("/api/convert", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ json: raw, rootName: rootNameInput.value || "Root" }),
      });

      const data = await resp.json();

      if (data.error) {
        showError(data.error);
        return;
      }

      lastTs = data.typescript;
      lastZod = data.zod;
      tsOutput.innerHTML = highlight(data.typescript);
      zodOutput.innerHTML = highlight(data.zod);
      status.textContent = "Converted successfully";
    } catch (e) {
      showError(e.message || "Conversion failed");
    }
  }

  function showError(msg) {
    const errorHtml = `<div class="error-message">Error: ${escapeHtml(msg)}</div>`;
    tsOutput.innerHTML = errorHtml;
    zodOutput.innerHTML = errorHtml;
    status.textContent = "Error";
  }

  // ── Syntax highlighting (simple regex-based) ───────────
  function highlight(code) {
    let html = escapeHtml(code);
    // Comments
    html = html.replace(/(\/\/.*)/g, '<span class="hl-comment">$1</span>');
    // Keywords
    html = html.replace(/\b(export|interface|type|const|import|from)\b/g, '<span class="hl-keyword">$1</span>');
    // Types/identifiers after : or =
    html = html.replace(/\b(string|number|boolean|unknown|null|z)\b/g, '<span class="hl-type">$1</span>');
    // Strings
    html = html.replace(/("(?:[^"\\]|\\.)*")/g, '<span class="hl-string">$1</span>');
    return html;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ── Copy to clipboard ──────────────────────────────────
  copyBtn.addEventListener("click", async () => {
    const text = currentTab === "ts" ? lastTs : lastZod;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.classList.add("copied");
      copyBtn.querySelector("svg + *") || (copyBtn.lastChild.textContent = " Copied!");
      setTimeout(() => {
        copyBtn.classList.remove("copied");
        copyBtn.lastChild.textContent = " Copy";
      }, 1500);
    } catch {
      // Fallback
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
  });

  // ── Format JSON ────────────────────────────────────────
  formatBtn.addEventListener("click", () => {
    try {
      const parsed = JSON.parse(jsonInput.value);
      jsonInput.value = JSON.stringify(parsed, null, 2);
      convert();
    } catch { /* ignore if invalid */ }
  });

  // ── Clear ──────────────────────────────────────────────
  clearBtn.addEventListener("click", () => {
    jsonInput.value = "";
    convert();
  });
</script>
</body>
</html>
